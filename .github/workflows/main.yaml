name: build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    environment: build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    concurrency:
      group: ci-${{ github.ref }}
      cancel-in-progress: true

    defaults:
      run:
        shell: bash -l {0}

    steps:
    - name: Semantic Release PR Title Check
      uses: osl-incubator/semantic-release-pr-title-check@v1.4.2
      with:
        convention-name: conventionalcommits 

    - uses: actions/checkout@v4

    - name: Free Disk Space (Ubuntu)
      uses: jlumbroso/free-disk-space@main
      with:
        tool-cache: true
        android: true
        dotnet: true
        haskell: true
        large-packages: true
        docker-images: true
        swap-storage: true

    - uses: conda-incubator/setup-miniconda@v3
      with:
        miniforge-version: latest
        environment-file: conda/base.yaml
        channels: conda-forge,nodefaults
        activate-environment: mosqlimate
        auto-update-conda: true
        conda-solver: libmamba

    - name: Install dependencies
      run: |
        poetry config virtualenvs.create false
        poetry install --no-root

    - name: Clean Conda Cache
      run: |
        conda clean --all --yes

    - name: Install frontend deps
      run: |
        cd frontend
        npm install

    - name: Lint
      run: make lint

    - name: Setup containers
      id: setup
      run: |
        python contrib/scripts/do_dotenv.py
        python contrib/scripts/do_psqlconf.py
        docker network create infodengue-dev_infodengue

    - name: Start containers
      id: start
      continue-on-error: true
      run: |
        sugar compose up --options -d 2>&1 | tee /tmp/container-start.log

    - name: Collect errors
      if: steps.start.outcome != 'success'
      run: |
        echo "::group::Container Start Errors (only relevant lines)"
        echo ""
        echo "--- Failed / Unhealthy Services ---"
        sugar compose ps --options "-a" 2>/dev/null | grep -E "Exit|unhealthy|starting" || echo "(no containers running)"
        echo ""
        echo "--- Error Lines ---"
        grep -iE 'error[^a-z]|fatal|traceback|exception|denied|failed to|cannot|could not|invalid' /tmp/container-start.log | head -40
        echo ""
        echo "::endgroup::"
        exit 1

    - name: Migration check
      run: |
        sugar compose exec --service backend --options "-T" --cmd "python manage.py makemigrations --check --dry-run"

    - name: Test
      run: |
        make test SUGAR=true

    - name: Install coverage
      run: |
        sugar compose exec --service backend --options "-T" --cmd "pip install coverage"

    - name: Coverage
      run: |
        make test-cov SUGAR=true
